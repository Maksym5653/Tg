name: Build NickCatcher APK

# Запускається при push у main/master, при Pull Request, і вручну (кнопка "Run workflow")
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозиторію
        uses: actions/checkout@v4

      - name: Встановити JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Встановити Android SDK
        uses: android-actions/setup-android@v3

      # google-services.json НЕ зберігається в репозиторії (в ньому Firebase-ключі проєкту).
      # Кладемо його з GitHub Secret: Settings → Secrets and variables → Actions →
      # Secrets → New repository secret → назва GOOGLE_SERVICES_JSON,
      # значення — просто весь вміст файлу google-services.json, вставлений як є.
      - name: Відновити google-services.json з секрету
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "⚠️  Секрет GOOGLE_SERVICES_JSON не заданий — Firebase не працюватиме, але збірка триватиме."
          else
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "✅ google-services.json відновлено"
          fi

      # Ключ Gemini теж не тримаємо в репозиторії — підставляємо під час збірки.
      # Секрет: Settings → Secrets and variables → Actions → New repository secret → GEMINI_API_KEY
      - name: Підставити GEMINI_API_KEY у Config.kt
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          CONFIG_FILE="app/src/main/java/ua/hackteam/nickcatcher/Config.kt"
          if [ -n "$GEMINI_API_KEY" ]; then
            sed -i "s|const val GEMINI_API_KEY = \".*\"|const val GEMINI_API_KEY = \"$GEMINI_API_KEY\"|" "$CONFIG_FILE"
            echo "✅ GEMINI_API_KEY підставлено з секрету"
          else
            echo "⚠️  Секрет GEMINI_API_KEY не заданий — залишається значення з коду (fallback на локальну евристику)"
          fi

      - name: Надати права на виконання gradlew
        run: chmod +x ./gradlew || true

      - name: Налаштувати Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Зібрати debug APK
        run: gradle assembleDebug --no-daemon

      - name: Завантажити APK як артефакт
        uses: actions/upload-artifact@v4
        with:
          name: nickcatcher-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
